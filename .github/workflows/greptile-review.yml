name: Greptile AI Review

on:
  workflow_dispatch: # disabled — enable once GREPTILE_API_KEY secret is configured

jobs:
  greptile:
    name: greptile-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Greptile PR Review
        uses: greptileai/greptile-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          greptile_api_key: ${{ secrets.GREPTILE_API_KEY }}
