name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

defaults:
  run:
    working-directory: careos-claude-code/careos-claude-code

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: careos-claude-code/careos-claude-code/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('careos-claude-code/careos-claude-code/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: node node_modules/.bin/eslint src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: careos-claude-code/careos-claude-code/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('careos-claude-code/careos-claude-code/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (client + shared)
        run: node node_modules/.bin/tsc --noEmit

      - name: TypeScript check (server)
        run: node node_modules/.bin/tsc -p tsconfig.server.json --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: careos-claude-code/careos-claude-code/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('careos-claude-code/careos-claude-code/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: node node_modules/.bin/vitest run

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: careos-claude-code/careos-claude-code/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('careos-claude-code/careos-claude-code/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build (frontend)
        run: node node_modules/.bin/vite build

      - name: Build (server)
        run: npm run build:server
