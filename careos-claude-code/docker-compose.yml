# CareOS Local Development Stack
# Usage: docker compose up -d

services:
  careos-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careos
      POSTGRES_USER: careos
      POSTGRES_PASSWORD: careos_dev
    ports:
      - "5432:5432"
    volumes:
      - careos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aidbox-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aidbox
      POSTGRES_USER: aidbox
      POSTGRES_PASSWORD: aidbox_dev_password
    ports:
      - "5433:5432"
    volumes:
      - aidbox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  aidbox:
    image: healthsamurai/aidboxone:latest
    depends_on:
      aidbox-db:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      AIDBOX_PORT: 8888
      AIDBOX_FHIR_VERSION: 4.0.1
      PGHOST: aidbox-db
      PGPORT: 5432
      PGDATABASE: aidbox
      PGUSER: aidbox
      PGPASSWORD: aidbox_dev_password
      AIDBOX_CLIENT_ID: root
      AIDBOX_CLIENT_SECRET: secret
      AIDBOX_ADMIN_ID: admin
      AIDBOX_ADMIN_PASSWORD: admin
      AIDBOX_BASE_URL: http://localhost:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  careos_pg_data:
  redis_data:
  aidbox_pg_data:
